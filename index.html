  1:[{k:"Ubuntu / Hunhu", v:"'I am because we are.' Identity is communal, not individual. Stanlake Samkange formalised this as Zimbabwean political philosophy in 1980."},

const ORGS = ["Teach For All","Teach For Zimbabwe","AIIDEV Africa","UNDP","Zimbabwe Open University (ZOU)","PGCN","MBIMB Network","Inst. for Economics & Peace","School / Education Institution","Government / Ministry","Civil Society / NGO","Community Organisation","Other / Individual"];
const ROLES = ["Teacher / Educator","Student / Youth Learner","Development Professional","Community Leader","Researcher / Academic","Policy Maker / Government","NGO / Civil Society Worker","DEI Advocate / Practitioner","School Leader / Administrator","Other"];

const Q = [
{z:1,t:"mcq",p:10,q:"The Cycle of Socialisation and Cycle of Liberation were developed by:",o:["Paulo Freire","Bobbie Harro","bell hooks","Stanlake Samkange"],a:1,e:"Bobbie Harro's frameworks map how systems shape identity before awareness, and how liberation becomes possible through collective action."},
{z:1,t:"tf",p:10,q:"Socialisation begins before we are conscious of it, absorbed through family and early community.",a:true,e:"We absorb values and identity markers from birth. Unlearning requires sustained, intentional effort."},
{z:1,t:"mcq",p:10,q:"The Shona concept that directly parallels Ubuntu philosophy is:",o:["Lobola","Nhaka","Hunhu","Gota"],a:2,e:"Hunhu, formalised as Zimbabwean political philosophy by Stanlake Samkange in 1980."},
{z:1,t:"mcq",p:10,q:"Ubuntu 'umuntu ngumuntu ngabantu' most directly supports:",o:["Individual achievement as the ultimate goal","Collective responsibility, equity requires community not just personal action","Merit systems as inherently neutral","Western frameworks as universally applicable"],a:1,e:"Ubuntu frames equity as a communal obligation. The village is incomplete when any member is excluded."},
{z:1,t:"scenario",p:20,q:"A colleague says: 'I treat everyone the same, I don't see gender.' You:",o:["Agree, treating everyone the same is equality","Name the worldview: gender-blindness erases lived experience and is not equity","Stay silent to preserve the relationship","Refer the matter to HR"],a:1,e:"Gender-blindness denies structural disadvantage. Equity requires seeing difference and responding with deliberate, corrective action."},
{z:1,t:"mcq",p:10,q:"The Cycle of Liberation begins with:",o:["Coalition building","Taking organised social action","Waking up, introspection and growing awareness","Changing national institutions"],a:2,e:"Liberation begins internally. You cannot change what you cannot see."},
{z:1,t:"tf",p:10,q:"Dominant group members often experience their own identity as 'default' rather than as a socialised identity.",a:true,e:"Creating space for this recognition without shame is a foundational DEI practitioner skill."},
{z:1,t:"mcq",p:10,q:"Why is personal storytelling foundational in DEI work?",o:["It is easier than data","Stories surface how systems shaped our identity, making invisible socialisation visible","It replaces academic DEI frameworks","It builds relationships without intellectual engagement"],a:1,e:"Storytelling is epistemological, the stories we carry contain evidence of how systems have shaped us."},
{z:1,t:"tf",p:10,q:"A DEI practitioner's first obligation is to change others, personal self-awareness is secondary.",a:false,e:"False. DEI work must begin with self. You cannot facilitate transformation in others that you have not begun in yourself."},
{z:1,t:"scenario",p:30,q:"BOSS LEVEL — A participant says: 'I don't have an identity, I'm just normal.' You are facilitating. You:",o:["Move on quickly to avoid disrupting the flow","Invite reflection: everyone has a socialised identity, including dominant groups","Correct them sharply in front of the group","Ask other participants to respond on your behalf"],a:1,e:"Dominant groups experience their identity as 'default', which is itself a socialised condition."},
{z:2,t:"mcq",p:10,q:"Approximately what proportion of Zimbabwean women aged 15–49 have experienced physical violence?",o:["1 in 10","1 in 5","1 in 3","1 in 2"],a:2,e:"Approximately 1 in 3 (39.4%). Structural responses are required simultaneously."},
{z:2,t:"mcq",p:10,q:"Section 56 of Zimbabwe's 2013 Constitution guarantees:",o:["The right to a basic state-funded education","Equality and non-discrimination across all protected characteristics","Freedom of conscience and religion","The right to form political parties"],a:1,e:"Section 56 guarantees equality and non-discrimination."},
{z:2,t:"tf",p:10,q:"Zimbabwe's national O-Level pass rate in 2024 was above 50%.",a:false,e:"False, the 2024 national pass rate was 33.19%."},
{z:2,t:"mcq",p:10,q:"What percentage of Zimbabwean women were married before age 18 as of 2022?",o:["8.4%","16.2%","33.7%","42.1%"],a:1,e:"16.2%, a declining but persistently serious barrier."},
{z:2,t:"scenario",p:20,q:"A policy document states: 'Women in precolonial Africa were always subordinate to male authority.' In a workshop, you:",o:["Accept it","Challenge it: women held spiritual authority, agricultural governance and mediation roles","Avoid the debate","Agree but note things have improved"],a:1,e:"Spirit mediums like Nehanda demonstrate substantial precolonial female agency."},
{z:2,t:"mcq",p:10,q:"The SADC Protocol commits member states to what percentage of women in decision-making by 2030?",o:["30%","40%","50%","60%"],a:2,e:"50%. Parliaments with higher female representation demonstrate stronger legislative attention to health, education and child protection."},
{z:2,t:"mcq",p:10,q:"Matabeleland North's Grade 7 pass rate in 2020 was:",o:["31%","24%","16%","8%"],a:2,e:"16%, compared to Harare's 66.5%."},
{z:2,t:"tf",p:10,q:"Only 15% of Zimbabwe's population completes upper secondary education.",a:true,e:"Access without completion is inclusion without equity."},
{z:2,t:"mcq",p:10,q:"The BaTonga people of Binga were displaced to build:",o:["Hwange Power Station","Kariba Dam","Cahora Bassa Dam","The Limpopo Valley Irrigation Scheme"],a:1,e:"23,000 BaTonga were displaced to generate electricity."},
{z:2,t:"scenario",p:30,q:"BOSS LEVEL — A district education officer says: 'Our pass rates are low because rural parents don't value education.' Applying the Village Systems Model, you:",o:["Agree, community attitudes drive outcomes","Diagnose all vectors: Geography, Economic, Policy, Institutional, Climate, Community and Gender","Suggest parent education programmes only","Avoid disagreeing with the officer's authority"],a:1,e:"The Village Systems Model demands analysis across all vectors simultaneously."},
{z:3,t:"mcq",p:10,q:"Africana Womanism was developed by:",o:["Chimamanda Ngozi Adichie","Clenora Hudson-Weems","Oyèrónkẹ Oyěwùmí","bell hooks"],a:1,e:"Hudson-Weems situates African women's struggle within race, class, culture and community."},
{z:3,t:"tf",p:10,q:"Gender equity and gender equality mean the same thing.",a:false,e:"Gender equality removes barriers for all. Gender equity applies corrective measures for historical disadvantage."},
{z:3,t:"mcq",p:10,q:"Gender equity involves deliberately ___ the girl child given historical structural disadvantage:",o:["Protecting","Separating","Elevating","Privileging"],a:2,e:"Elevating is corrective, not preferential."},
{z:3,t:"scenario",p:20,q:"A donor insists your programme adopt a specific ideological position to receive funding. You:",o:["Accept, funding is critical","Assert institutional sovereignty: reject ideological conditionality","Partially comply while maintaining internal disagreement","Ignore the condition and accept the money"],a:1,e:"Community-generated knowledge, not donor-conditioned ideology, must drive programming design."},
{z:3,t:"mcq",p:10,q:"The spirit medium who led Zimbabwean anti-colonial resistance is:",o:["Lobengula","Nehanda","Mbuya Chipfaya","Sekai Nzenza"],a:1,e:"Nehanda exercised political agency and spiritual leadership long before Western feminist movements emerged."},
{z:3,t:"tf",p:10,q:"The 50/50 representation goal is a demand for identical domestic roles for men and women.",a:false,e:"50/50 is a governance principle for equitable presence in spaces of authority."},
{z:3,t:"mcq",p:10,q:"The 2021 Zimbabwe GBV data records how many women abused nationally?",o:["3,053","5,301","12,186","15,239"],a:2,e:"12,186 women, alongside 3,053 men and 5,301 children."},
{z:3,t:"scenario",p:20,q:"A colleague argues: 'Focusing on boy child education takes resources away from girls.' You:",o:["Agree, evidence prioritises girls","Affirm girls' priority needs, then introduce the both/and evidence","Dismiss the concern","Suggest separating the debates"],a:1,e:"GBV prevention that invests only in girls without transforming boys addresses symptom rather than structure."},
{z:3,t:"mcq",p:10,q:"The Gota programme develops:",o:["Girl child scholarships","Boy child responsibility, care and respect","Menstrual health provision","Community mediation in GBV cases"],a:1,e:"Investing in transformative boy child programming is structurally less costly than repairing harm from untransformed masculinity."},
{z:3,t:"scenario",p:30,q:"BOSS LEVEL — A headteacher says: 'We focus on the girl child only, boys are fine.' You:",o:["Agree, institutional focus should remain exclusively on girls","Present the evidence and propose a both/and school programme","Stay silent, the headteacher has authority","Wait for national policy to address boy child issues"],a:1,e:"The both/and imperative: girl child empowerment and boy child transformation are structural complements."},
{z:4,t:"mcq",p:10,q:"According to Zimbabwe's 2021 GBV data, what percentage of all GBV victims were children?",o:["12.4%","19.1%","25.8%","31.2%"],a:2,e:"25.8%, 4,115 girls and 1,186 boys."},
{z:4,t:"tf",p:10,q:"Excluding boys from menstrual health education protects girls' safe space and produces better equity outcomes.",a:false,e:"Exclusion produces ignorance, stigma and institutional barriers for girls."},
{z:4,t:"mcq",p:10,q:"UNICEF Zimbabwe (2025) estimated how many children require urgent humanitarian assistance?",o:["1.2 million","2.1 million","3.5 million","4.8 million"],a:2,e:"3.5 million, driven by El Niño drought."},
{z:4,t:"scenario",p:20,q:"MBIMB — A Form 1 student discloses that an older student touched them inappropriately and asks you not to tell anyone. You:",o:["Respect confidentiality and say nothing","Reassure the student, explain you are mandated to report to protect them","Handle it yourself without involving administration","Tell the student's parents directly, bypassing school procedures"],a:1,e:"My Body Is My Body: disclosures of abuse are NEVER confidential."},
{z:4,t:"mcq",p:10,q:"Approximately what percentage of rural Zimbabwean girls' school days are lost to period poverty?",o:["5%","10%","20%","35%"],a:2,e:"20%, one school day in five."},
{z:4,t:"tf",p:10,q:"Male GBV survivors face fewer disclosure barriers than female survivors.",a:false,e:"Male survivors face compounded barriers: stigma, absent support infrastructure and masculinity norms."},
{z:4,t:"mcq",p:10,q:"Zimbabwe's BEAM programme does NOT currently cover:",o:["Tuition fees","Examination fees","School uniforms, meals and learning materials","Building fund contributions"],a:2,e:"A child can be a registered BEAM beneficiary and still be sent home for lacking a uniform."},
{z:4,t:"scenario",p:20,q:"Children around 10 years old are organised as beggars in a city CBD with daily financial targets set by adults. This constitutes:",o:["A poverty coping strategy requiring community sensitivity","Child economic exploitation under ILO Convention No. 182","A cultural practice requiring contextual sensitivity","A welfare issue only"],a:1,e:"Directing attention to the supervising adults identifies a structured exploitation system."},
{z:4,t:"mcq",p:10,q:"The Education Amendment Act of 2020 prohibits:",o:["Holiday lessons at private centres","Exclusion from school on grounds of pregnancy","Male teachers from teaching female-only classes","Corporal punishment in primary schools only"],a:1,e:"Implementation gaps remain, mandatory maternity leave still functions as de facto exclusion in some schools."},
{z:4,t:"scenario",p:30,q:"BOSS LEVEL — A 13-year-old girl has been absent 3 weeks. Her teacher says: 'Her family couldn't afford the uniform.' Applying the Village Systems Model, you identify barriers in:",o:["Only the Economic Vector","Policy, Economic, Gender and Community Vectors simultaneously","Only the Institutional Vector","The Climate Vector only"],a:1,e:"A single-vector response to a multi-vector exclusion will always fall short."},
{z:6,t:"scenario",p:20,q:"TFZ LEADERSHIP — Your headteacher publicly mocks a student who raised a gender equality concern. Your first action is:",o:["Stay silent","Name the harm privately with the headteacher after assembly","Post about it on social media immediately","Report directly to the Ministry without engaging the headteacher first"],a:1,e:"Name harm at the right level first. Private, evidence-grounded engagement is proportionate and relationship-preserving."},

function computeProfile(answers, dims, questions){
  const buckets={}; dims.forEach(d=>buckets[d.id]=[]);
  questions.forEach((q,i)=>{ let v=answers[i]||3; if(q.reverse) v=6-v; buckets[q.dim].push(v); });
  const scores={}; dims.forEach(d=>{ const a=buckets[d.id]; scores[d.id]=Math.round(((a.reduce((x,y)=>x+y,0)/a.length-1)/4)*100); });
  const overall=Math.round(Object.values(scores).reduce((a,b)=>a+b,0)/dims.length);
  const strongest=dims.reduce((best,d)=>scores[d.id]>scores[best.id]?d:best,dims[0]);
  return {scores, overall, strongest};
}
function toolkitLevel(o){
  if(o<40) return {level:"Emerging Practitioner 🌱", desc:"You are building your practitioner foundation, awareness is the first tool.", alp:"Start a 4-week equity reflection journal."};
  if(o<65) return {level:"Developing Practitioner 📚", desc:"You have a growing toolkit and are beginning to apply it in real contexts.", alp:"Design and pilot a classroom or community intervention."};
  if(o<85) return {level:"Skilled Practitioner ⭐", desc:"You deploy equity tools with confidence and facilitate across difference.", alp:"Deploy RUZIVO in your school or ward, train 3–5 peer facilitators."};
  return {level:"Expert Practitioner 🏆", desc:"You are equipped to train others, design DEI systems and lead institutional change.", alp:"Contribute to a PGCN position paper or propose a curriculum module to MoPSE."};
}
function deiProfileLabel(o){
  if(o<40) return {profile:"Inclusive Thinker 🌱", tagline:"You are building awareness, the essential first step toward equity practice.", alp:"Keep a bias journal and attend one community DEI dialogue."};
  if(o<65) return {profile:"Equity Practitioner 📚", tagline:"You apply DEI knowledge into real, deliberate action.", alp:"Deploy RUZIVO with a community group and bring it back to your PGCN or TFZ network."};
  if(o<85) return {profile:"Community Change Leader ⭐", tagline:"You lead change within your community and bring others with you.", alp:"Train 5 peer DEI facilitators in your district and present at a network event."};
  return {profile:"Systems Transformation Champion 🏆", tagline:"You are positioned to drive systemic, institutional change.", alp:"Contribute to PGCN's Annual State of Gender Equality Report or submit a policy brief."};
}

async function savePlayer(deiProf){
  const data = {
    timestamp:new Date().toISOString(), name:S.name, country:S.country, org:S.org, role:S.role,
    lang:"en", score:S.score, pct:pct(), deiProfile:(deiProf&&deiProf.profile)||"—",
    practitionerLevel:(S.z5Profile&&S.z5Profile.level)||"—", zonesCompleted:S.done.length+2
  };
  if(CONFIG.API_URL){
    try{
      await fetch(CONFIG.API_URL, {method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify(data)});
    }catch(e){ console.warn("Backend save failed, falling back to local storage.", e); }
  }
  try{
    const local = JSON.parse(localStorage.getItem("ruzivo_players")||"[]");
    local.push(data);
    localStorage.setItem("ruzivo_players", JSON.stringify(local));
  }catch(e){}
}

async function loadME(){
  S.meLoading = true; render();
  let players = [];
  if(CONFIG.API_URL){
    try{
      const res = await fetch(CONFIG.API_URL + "?action=list");
      const json = await res.json();
      if(json.ok) players = json.players.map(p=>({...p, score:Number(p.score)||0, pct:Number(p.pct)||0}));
    }catch(e){ console.warn("Backend fetch failed, showing local data only.", e); }
  }
  if(players.length===0){
    try{ players = JSON.parse(localStorage.getItem("ruzivo_players")||"[]"); }catch(e){}
  }
  S.mePlayers = players.sort((a,b)=> new Date(b.timestamp)-new Date(a.timestamp));
  S.meLoading = false;
  render();
}

/* ---------- game logic ---------- */
function startTimer(){
  clearInterval(timerRef); S.timeLeft=30; S.timedOut=false;
  timerRef = setInterval(()=>{
    S.timeLeft = Math.max(0, S.timeLeft-1);
    if(S.timeLeft===0 && !S.shown && !picking){
      clearInterval(timerRef); picking=true; S.shown=true; S.timedOut=true;
      S.lives=Math.max(0,S.lives-1); S.streak=0;
      const q=cur(); const corr = q.t==="tf" ? (q.a?"TRUE ✓":"FALSE ✗") : q.o[q.a];
      S.wrongAnswers.push({q:q.q, correct:corr, your:UI.timesUp, exp:q.e});
    }
    render();
  },1000);
}

function launchZone(zId){
  const zInfo = ZONES.find(z=>z.id===zId);
  S.wrongAnswers=[];
  if(zInfo.type==="toolkit"){ S.z5Idx=0; S.z5Ans=[]; picking=false; S.screen="toolkit"; }
  else{
    S.zoneQs = shuffle(Q.filter(q=>q.z===zId)); S.zone=zId; S.qIdx=0; S.sel=null; S.shown=false;
    S.hintUsed=false; S.hintText=""; S.timedOut=false; S.zStart=S.score; S.screen="game";
    startTimer();
  }
  render();
}
function startZone(zId){
  const zInfo = ZONES.find(z=>z.id===zId);
  if(zInfo.type==="psychometric"){ S.z7Idx=0; S.z7Ans=[]; picking=false; S.screen="psychometric"; }
  else{ S.conceptZone=zId; S.screen="concept"; }
  render();
}
function pick(i){
  if(S.shown || picking) return;
  clearInterval(timerRef); picking=true; S.sel=i; S.shown=true; S.timedOut=false;
  const q=cur(); const ok = q.t==="tf" ? (i===0)===q.a : i===q.a;
  if(ok){
    const b=S.streak>=2?5:0; S.score+=q.p+b; S.hits++;
    S.streak++; S.best=Math.max(S.best,S.streak);
  }else{
    S.lives=Math.max(0,S.lives-1); S.streak=0;
    const corr = q.t==="tf" ? (q.a?"TRUE ✓":"FALSE ✗") : q.o[q.a];
    S.wrongAnswers.push({q:q.q, correct:corr, your:q.o?q.o[i]:(i===0?"TRUE ✓":"FALSE ✗"), exp:q.e});
  }
  render();
}
function nextQ(){
  clearInterval(timerRef); picking=false; S.hintUsed=false; S.hintText="";
  if(S.qIdx+1 < S.zoneQs.length){
    S.qIdx++; S.sel=null; S.shown=false; S.timedOut=false; startTimer();
  }else{
    const earned = S.score - S.zStart;
    S.zScores[S.zone]=earned;
    S.zoneCompleteData={zoneId:S.zone, score:earned};
    S.screen = S.wrongAnswers.length>0 ? "wrongreview" : "zonecomplete";
  }
  render();
}
function useHint(){
  if(S.hintUsed) return;
  S.hintUsed=true; S.score=Math.max(0,S.score-5);
  S.hintText=(cur().e||"").split(".")[0]+"...";
  render();
}
function pickLikert(val,type){
  if(picking) return; picking=true;
  if(type==="toolkit"){
    S.z5Ans[S.z5Idx]=val;
    setTimeout(()=>{
      picking=false;
      if(S.z5Idx+1<PSYCH_Q5.length){ S.z5Idx++; }
      else{
        const r=computeProfile(S.z5Ans,PRACTITIONER_DIMS,PSYCH_Q5);
        S.z5Profile={...r, ...toolkitLevel(r.overall)};
        if(!S.done.includes(5)) S.done.push(5);
        S.screen="map";
      }
      render();
    },200);
  }else{
    S.z7Ans[S.z7Idx]=val;
    setTimeout(()=>{
      picking=false;
      if(S.z7Idx+1<PSYCH_Q7.length){ S.z7Idx++; }
      else{
        const r=computeProfile(S.z7Ans,DIMENSIONS,PSYCH_Q7);
        const prof={...r, ...deiProfileLabel(r.overall)};
        S.z7Profile=prof;
        if(!S.done.includes(7)) S.done.push(7);
        savePlayer(prof);
        S.screen="report";
      }
      render();
    },200);
  }
  render();
}

        <div style="flex:1;"><p style="color:${p.name===S.name?'#27AE60':'#fff'};font-weight:bold;font-size:12px;">${esc(p.name)}${p.name===S.name?' 👈':''}</p><p style="color:rgba(255,255,255,.7);font-size:9px;">${esc(p.country||'—')} · ${esc(p.org||'—')} · ${esc(p.role||'—')}</p></div>

      </div>`).join("")}
    ${footerNote("Live data · PGCN EGSI Framework")}
  </div>`;
}

    </div>
    <button class="btn secondary" onclick="loadME()">🔄 Refresh</button>

  <div class="screen center" style="padding:18px 14px 36px;">
    <div class="cert-wrap" style="border:2px solid ${C.blue};box-shadow:0 0 60px ${C.green}18;">
      <div class="cert-header" style="background:linear-gradient(135deg,#0a1a2e,#08251a);">
        <p style="color:${C.blue};font-size:8px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:3px;">Peace, Gender and Climate Network · EGSI Certified</p>
        <div style="font-size:32px;margin:3px 0;">🏆</div>
        <h2 style="font-weight:900;font-size:15px;margin-bottom:2px;">CERTIFICATE OF COMPLETION</h2>

        <p style="color:${C.green};font-size:22px;font-weight:900;margin-bottom:3px;">${esc(S.name)}</p>
        ${(S.country||S.org)?`<p style="color:rgba(255,255,255,.7);font-size:9px;margin-bottom:5px;">${esc(S.country)}${S.country&&S.org?' · ':''}${esc(S.org)}${S.role?' · '+esc(S.role):''}</p>`:''}
        <p style="color:rgba(255,255,255,.8);font-size:10px;line-height:1.55;margin-bottom:12px;">${UI.certBody}</p>
        <div style="border-radius:13px;padding:12px;margin-bottom:10px;background:rgba(255,255,255,.04);border:1px solid ${C.blue}33;text-align:left;">
          <p style="color:${C.blue};font-size:9px;font-weight:bold;letter-spacing:.06em;margin-bottom:8px;text-transform:uppercase;">📊 ${UI.knowledgeAch}</p>

              .map(([l,v,c])=>`<div class="stat-box" style="background:${c}18;"><p style="color:${c};font-size:17px;font-weight:900;">${v}</p><p style="color:rgba(255,255,255,.7);font-size:8px;">${l}</p></div>`).join("")}
          </div>
        </div>
        ${S.z5Profile?`<div style="border-radius:13px;padding:13px;margin-bottom:10px;background:linear-gradient(135deg,${C.green}12,${C.green}05);border:1px solid ${C.green}33;text-align:left;">
          <p style="color:${C.green};font-size:9px;font-weight:bold;letter-spacing:.06em;margin-bottom:6px;text-transform:uppercase;">🧰 ${UI.practitioner}</p>
          <p style="color:${C.green};font-size:15px;font-weight:900;margin-bottom:3px;">${S.z5Profile.level}</p>
          <p style="color:rgba(255,255,255,.8);font-size:10px;margin-bottom:9px;line-height:1.5;">${S.z5Profile.desc}</p>
          ${PRACTITIONER_DIMS.map(d=>DimBar(d,S.z5Profile.scores[d.id])).join("")}
          <div style="border-radius:7px;padding:5px 8px;background:${S.z5Profile.strongest.color}22;margin-top:5px;"><p style="color:${S.z5Profile.strongest.color};font-size:9px;font-weight:bold;">${S.z5Profile.strongest.icon} ${UI.strength}: ${S.z5Profile.strongest.label}</p></div>
        </div>`:''}
        ${S.z7Profile?`<div style="border-radius:13px;padding:13px;margin-bottom:10px;background:linear-gradient(135deg,${C.teal}12,${C.teal}05);border:1px solid ${C.teal}33;text-align:left;">

          <p style="color:rgba(255,255,255,.8);font-size:10px;margin-bottom:9px;line-height:1.5;">${S.z7Profile.tagline}</p>

          <div style="border-radius:7px;padding:5px 8px;background:${S.z7Profile.strongest.color}22;margin-top:5px;"><p style="color:${S.z7Profile.strongest.color};font-size:9px;font-weight:bold;">${S.z7Profile.strongest.icon} ${UI.strength}: ${S.z7Profile.strongest.label}</p></div>
        </div>`:''}

        <div style="border-radius:12px;padding:11px;margin-bottom:10px;background:${C.green}10;border:1px solid ${C.green}33;text-align:center;"><p style="color:${C.green};font-size:10px;font-weight:900;letter-spacing:.08em;">⬡ EGSI CERTIFIED 2026</p><p style="color:rgba(255,255,255,.7);font-size:8px;margin-top:2px;">Earth Gaming Standards International · PGCN Game Architect</p></div>
      </div>
    </div>
    <button class="btn" style="max-width:440px;margin-top:14px;background:linear-gradient(135deg,${C.blue},${C.green});color:#fff;" onclick="downloadCert()">${S.certLoading?'⏳ Generating...':'📄 Download PGCN Certificate'}</button>
    <button class="btn secondary" style="max-width:440px;" onclick="loadME();S.screen='leaderboard';render()">🏆 View Global Leaderboard</button>
    ${contactBox()}
    <button class="btn secondary" style="max-width:200px;" onclick="resetAll();S.screen='intro';render()">${UI.again}</button>
  </div>`;
}
function downloadCert(){
  try{
    const cv = buildCert();
    const a = document.createElement('a');
    a.download = `RUZIVO_PGCN_Certificate_${(S.name||'Participant').replace(/\s+/g,'_')}_2026.png`;
    a.href = cv.toDataURL('image/png',1.0);
    a.click();
  }catch(e){ alert('Please screenshot this screen to save your certificate.'); }
}

/* ---------- router ---------- */
function updateBeginBtn(){
  const b = document.getElementById('beginBtn');
  if(!b) return;
  const ok = S.country.trim().length > 0;
  b.disabled = !ok;
  b.style.opacity = ok ? '1' : '.4';
}

function render(){
  const app = document.getElementById("app");
  let html = "";
  switch(S.screen){
    case "intro": html = screenIntro(); break;
    case "register": html = screenRegister(); break;
    case "concept": html = screenConcept(); break;
    case "map": html = screenMap(); break;
    case "zonecomplete": html = screenZoneComplete(); break;
    case "wrongreview": html = screenWrongReview(); break;
    case "game": html = screenGame(); break;
    case "toolkit": html = screenLikert("toolkit"); break;
    case "psychometric": html = screenLikert("psychometric"); break;
    case "leaderboard": html = screenLeaderboard(); break;
    case "me": html = screenME(); break;
    case "report": html = screenReport(); break;
    default: html = screenIntro();
  }
  app.innerHTML = html;
  if(S.screen==="zonecomplete") spawnConfetti();
}
function spawnConfetti(){
  const host = document.getElementById("confettiHost");
  if(!host) return;
  const colors=[C.gold,C.blue,C.green,C.purple,C.pink,C.teal,C.red];
  for(let i=0;i<40;i++){
    const p=document.createElement("div");
    p.className="confetti-piece";
    const size=6+Math.random()*6;
    p.style.left=(Math.random()*100)+"%";
    p.style.width=size+"px"; p.style.height=size+"px";
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.borderRadius=Math.random()>0.5?"50%":"2px";
    p.style.animationDuration=(1.4+Math.random()*1.2)+"s";
    p.style.animationDelay=(Math.random()*0.8)+"s";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),3000);
  }
}

render();
</script>
